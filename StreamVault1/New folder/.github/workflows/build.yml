name: Build & Release APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.4
        continue-on-error: true

      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            # Download gradle wrapper jar directly
            mkdir -p gradle/wrapper
            WRAPPER_URL="https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar"
            curl -sL "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -o /tmp/gradle.zip
            cd /tmp && unzip -q gradle.zip
            cp /tmp/gradle-8.4/lib/gradle-wrapper-*.jar $GITHUB_WORKSPACE/gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: StreamVault-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: StreamVault-release
          path: app/build/outputs/apk/release/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: StreamVault-release

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: StreamVault-debug

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
