version: "3.9"

networks:
  media_net:
    name: media_net
    driver: bridge

x-common-env: &common_env
  PUID: "1000"
  PGID: "1000"
  TZ: "America/Chicago"
  UMASK: "002"

# Common mounts for media + downloads (from your /mnt/lan CIFS)
x-common-media-mounts: &common_media_mounts
  - /mnt/lan/media:/media
  - /mnt/lan/downloads:/downloads
  - /mnt/lan/tempcomplete:/completed

services:
  # -------------------------
  # Download clients
  # -------------------------
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment: *common_env
    volumes:
      - /mnt/docker/sabnzbd:/config
      - /mnt/docker/data/sabnzbd:/data
      - /mnt/lan/downloads:/incomplete-downloads
      - /mnt/lan/tempcomplete:/downloads
    ports:
      - "8080:8080"
    networks: [media_net]
    restart: unless-stopped

  deluge:
    image: lscr.io/linuxserver/deluge:latest
    container_name: deluge
    environment:
      <<: *common_env
      DELUGE_LOGLEVEL: "error"
    volumes:
      - /mnt/docker/deluge:/config
      - /mnt/docker/data/deluge:/data
      - /mnt/lan/downloads:/downloads
      - /mnt/lan/tempcomplete:/downloads-completed
    ports:
      - "8112:8112"
      - "6881:6881"
      - "6881:6881/udp"
      - "58846:58846"
    networks: [media_net]
    restart: unless-stopped

  # -------------------------
  # Indexer manager
  # -------------------------
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment: *common_env
    volumes:
      - /mnt/docker/prowlarr:/config
      - /mnt/docker/data/prowlarr:/data
    ports:
      - "9696:9696"
    networks: [media_net]
    restart: unless-stopped

  # -------------------------
  # Radarr A / B
  # -------------------------
  radarr_a:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr_a
    environment: *common_env
    volumes:
      - /mnt/docker/radarr_a:/config
      - /mnt/docker/data/radarr_a:/data
      - *common_media_mounts
    ports:
      - "7878:7878"
    networks: [media_net]
    restart: unless-stopped

  radarr_b:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr_b
    environment: *common_env
    volumes:
      - /mnt/docker/radarr_b:/config
      - /mnt/docker/data/radarr_b:/data
      - *common_media_mounts
    ports:
      - "7879:7878"
    networks: [media_net]
    restart: unless-stopped

  # -------------------------
  # Sonarr A / B
  # -------------------------
  sonarr_a:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr_a
    environment: *common_env
    volumes:
      - /mnt/docker/sonarr_a:/config
      - /mnt/docker/data/sonarr_a:/data
      - *common_media_mounts
    ports:
      - "8989:8989"
    networks: [media_net]
    restart: unless-stopped

  sonarr_b:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr_b
    environment: *common_env
    volumes:
      - /mnt/docker/sonarr_b:/config
      - /mnt/docker/data/sonarr_b:/data
      - *common_media_mounts
    ports:
      - "8990:8989"
    networks: [media_net]
    restart: unless-stopped

  # -------------------------
  # Lidarr A / B (you asked for this)
  # -------------------------
  lidarr_a:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr_a
    environment: *common_env
    volumes:
      - /mnt/docker/lidarr_a:/config
      - /mnt/docker/data/lidarr_a:/data
      - *common_media_mounts
    ports:
      - "8686:8686"
    networks: [media_net]
    restart: unless-stopped

  lidarr_b:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr_b
    environment: *common_env
    volumes:
      - /mnt/docker/lidarr_b:/config
      - /mnt/docker/data/lidarr_b:/data
      - *common_media_mounts
    ports:
      - "8687:8686"
    networks: [media_net]
    restart: unless-stopped

  # -------------------------
  # Readarr A / B (you asked for this)
  # -------------------------
  readarr_a:
    image: lscr.io/linuxserver/readarr:develop
    container_name: readarr_a
    environment: *common_env
    volumes:
      - /mnt/docker/readarr_a:/config
      - /mnt/docker/data/readarr_a:/data
      - *common_media_mounts
    ports:
      - "8787:8787"
    networks: [media_net]
    restart: unless-stopped

  readarr_b:
    image: lscr.io/linuxserver/readarr:develop
    container_name: readarr_b
    environment: *common_env
    volumes:
      - /mnt/docker/readarr_b:/config
      - /mnt/docker/data/readarr_b:/data
      - *common_media_mounts
    ports:
      - "8788:8787"
    networks: [media_net]
    restart: unless-stopped

  # -------------------------
  # Readarr-Audio A / B (keeping since you asked earlier; remove if not needed)
  # -------------------------
  readarr_audio_a:
    image: lscr.io/linuxserver/readarr:develop
    container_name: readarr_audio_a
    environment: *common_env
    volumes:
      - /mnt/docker/readarr_audio_a:/config
      - /mnt/docker/data/readarr_audio_a:/data
      - *common_media_mounts
    ports:
      - "8790:8787"
    networks: [media_net]
    restart: unless-stopped

  readarr_audio_b:
    image: lscr.io/linuxserver/readarr:develop
    container_name: readarr_audio_b
    environment: *common_env
    volumes:
      - /mnt/docker/readarr_audio_b:/config
      - /mnt/docker/data/readarr_audio_b:/data
      - *common_media_mounts
    ports:
      - "8791:8787"
    networks: [media_net]
    restart: unless-stopped

  # -------------------------
  # xTeVe A / B
  # -------------------------
  xteve_a:
    image: ghcr.io/xteve-project/xteve:latest
    container_name: xteve_a
    environment:
      TZ: "America/Chicago"
    volumes:
      - /mnt/docker/xteve_a:/config
      - /mnt/docker/data/xteve_a:/data
    ports:
      - "34400:34400"
    networks: [media_net]
    restart: unless-stopped

  xteve_b:
    image: ghcr.io/xteve-project/xteve:latest
    container_name: xteve_b
    environment:
      TZ: "America/Chicago"
    volumes:
      - /mnt/docker/xteve_b:/config
      - /mnt/docker/data/xteve_b:/data
    ports:
      - "34401:34400"
    networks: [media_net]
    restart: unless-stopped

  # -------------------------
  # Kiwix server (put .zim files under /mnt/lan/media/zim)
  # -------------------------
  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:3.7.0
    container_name: kiwix
    volumes:
      - /mnt/docker/kiwix:/config
      - /mnt/docker/data/kiwix:/data
      - /mnt/lan/media/zim:/data/zim
    ports:
      - "8085:8080"
    command: ["--address=0.0.0.0", "/data/zim/*.zim"]
    networks: [media_net]
    restart: unless-stopped

  # -------------------------
  # AdvancedFlashcardsWebServer_RPi (code stored on the CIFS share)
  # -------------------------
  advancedflashcards_webserver_rpi:
    image: python:3.12-slim
    container_name: advancedflashcards_webserver_rpi
    working_dir: /app
    environment:
      TZ: "America/Chicago"
    volumes:
      - /mnt/docker/advancedflashcards_webserver_rpi:/config
      - /mnt/docker/data/advancedflashcards_webserver_rpi:/data
      - /mnt/lan/sidscri-apps/AdvancedFlashcardsWebServer_RPi:/app
    ports:
      - "8009:8009"
    command: ["bash", "-lc", "pip install -r requirements.txt && python app.py"]
    networks: [media_net]
    restart: unless-stopped

  # -------------------------
  # Home Assistant (HOST network)
  # -------------------------
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    environment:
      TZ: "America/Chicago"
    volumes:
      - /mnt/docker/homeassistant:/config
      - /mnt/docker/data/homeassistant:/data
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    privileged: true
    network_mode: host
    restart: unless-stopped

  # -------------------------
  # Tautulli
  # -------------------------
  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    environment: *common_env
    volumes:
      - /mnt/docker/tautulli:/config
      - /mnt/docker/data/tautulli:/data
    ports:
      - "8181:8181"
    networks: [media_net]
    restart: unless-stopped

  # -------------------------
  # Calibre
  # -------------------------
  calibre:
    image: lscr.io/linuxserver/calibre:latest
    container_name: calibre
    environment: *common_env
    volumes:
      - /mnt/docker/calibre:/config
      - /mnt/docker/data/calibre:/data
      - /mnt/lan/media/books:/books
    ports:
      - "8086:8080"
      - "8186:8181"
      - "8087:8081"
    shm_size: "1gb"
    networks: [media_net]
    restart: unless-stopped

  # -------------------------
  # ASA "manager/server" on Linux (ASA server container)
  # NOTE: Exposes the game server ports; adjust for your map/cluster.
  # -------------------------
  asa_server_1:
    image: mschnitzer/asa-linux-server:latest
    container_name: asa_server_1
    environment:
      - ASA_START_PARAMS=TheIsland_WP?listen?Port=7777?RCONPort=27020?RCONEnabled=True -WinLiveMaxPlayers=30
      - ENABLE_DEBUG=0
    volumes:
      - /mnt/docker/asa_server_1:/config
      - /mnt/docker/data/asa_server_1:/data
    ports:
      - "7777:7777/udp"
      - "27020:27020/tcp"
    networks: [media_net]
    restart: unless-stopped
